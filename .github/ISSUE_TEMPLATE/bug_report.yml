name: Bug report
description: Report a reproducible SparkleReleaseKit problem
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not include private keys, certificates, tokens, passwords, or proprietary project source.
  - type: input
    id: version
    attributes:
      label: SparkleReleaseKit version
      placeholder: 0.1.0
    validations:
      required: true
  - type: dropdown
    id: project-type
    attributes:
      label: Project type
      options: [SwiftUI, AppKit, Mixed, Unknown]
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Include the exact command and sanitized output.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: Sanitized doctor output
      render: text
  - type: checkboxes
    id: safety
    attributes:
      label: Safety check
      options:
        - label: I removed all private keys, tokens, certificates, passwords, personal data, and proprietary source.
          required: true
